<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo en Vivo - Tómbola Adaptable</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Permite un flujo natural desde arriba */
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto; /* CORRECCIÓN: Permite hacer scroll con el dedo en celulares */
        }
        
        /* ESTILOS DEL LOGO SUPERIOR */
        .brand-logo {
            max-width: 100%;
            max-height: 80px; /* Tamaño controlado para no romper el layout */
            object-fit: contain;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 2rem;
            text-align: center;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        
        /* CUADRO VISUAL VERTICAL (Optimizado para Laptop/Tótem) */
        .slot-machine-box {
            position: relative;
            width: 100%;
            height: 490px; /* 70px por celda * 7 celdas */
            background: #151522;
            border: 4px solid #0066ff;
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.4), inset 0 0 15px rgba(0,0,0,0.8);
        }
        
        /* LÍNEAS INDICADORAS EN LA CELDA CENTRAL */
        .slot-machine-box::before, .slot-machine-box::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 0, 127, 0.8);
            z-index: 10;
            box-shadow: 0 0 8px #ff007f;
        }
        .slot-machine-box::before { top: 210px; }  
        .slot-machine-box::after { bottom: 210px; } 

        /* Flechas indicadoras laterales */
        .indicator-left, .indicator-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            z-index: 11;
            filter: drop-shadow(0 0 5px #ff007f);
        }
        .indicator-left {
            left: 10px;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 22px solid #ff007f;
        }
        .indicator-right {
            right: 10px;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 22px solid #ff007f;
        }

        /* Tira deslizante */
        .slot-strip {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        
        /* Celda de nombre */
        .slot-item {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            padding: 0 40px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Botones */
        button {
            background: linear-gradient(45deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 16px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.4);
            transition: transform 0.1s, filter 0.2s;
            width: 80%;
            max-width: 350px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #444; box-shadow: none; cursor: not-allowed; }
        
        #winner-display {
            margin-top: 15px;
            margin-bottom: 25px;
            font-size: 1.6rem;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
        }

        /* ========================================================
           📱 RESPONSIVE: ADAPTACIÓN AUTOMÁTICA PARA CELULARES
           ======================================================== */
        @media (max-height: 760px), (max-width: 480px) {
            .slot-machine-box {
                height: 350px; /* Se reduce a 5 celdas visibles en celular */
            }
            .slot-machine-box::before { top: 140px; }  /* Ajusta líneas a la 3ra celda */
            .slot-machine-box::after { bottom: 140px; }
            h1 { font-size: 1.6rem; }
            .slot-item { font-size: 1.4rem; }
            button { font-size: 1.2rem; padding: 12px 30px; }
            .brand-logo { max-height: 60px; } /* Ajuste de logo en móvil */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="brand-logo">

        <h1>Sorteo en Vivo</h1>
        <button id="btn-sync" onclick="fetchParticipants()" style="background: #3a3a55; font-size: 0.85rem; padding: 8px 20px; margin-bottom: 5px; width: auto; box-shadow: none;">🔄 Actualizar Lista</button>
         
        <div class="slot-machine-box">
            <div class="indicator-left"></div>
            <div class="indicator-right"></div>
            <div class="slot-strip" id="slot-strip">
                <div class="slot-item" style="color: #aaa;">Cargando...</div>
            </div>
        </div>

        <button id="btn-spin" onclick="startSlotMachine()">¡Iniciar Sorteo!</button>
        <div id="winner-display">Iniciando conexión con ArcGIS...</div>
    </div>

    <script>
        // ========================================================
        // 🚨 CONFIGURACIÓN DE TU CAPA DE ARCGIS ONLINE
        // ========================================================
        const ARCGIS_LAYER_URL = 'https://services8.arcgis.com/2qDHoDLqu6VOlf1y/arcgis/rest/services/survey123_33efe2aaf89243e6bf952c3dc96cce92/FeatureServer/0';
        const CAMPO_NOMBRE = 'nombres_y_apellidos'; 
        // ========================================================

        let participants = [];
        let isSpinning = false;
        const itemHeight = 70; 

        function getCentralOffset() {
            const box = document.querySelector('.slot-machine-box');
            const boxHeight = box.clientHeight;
            return (boxHeight / 2) - (itemHeight / 2);
        }

        function buildSlotStrip(list) {
            const strip = document.getElementById('slot-strip');
            strip.innerHTML = '';
            
            list.forEach(name => {
                const item = document.createElement('div');
                item.className = 'slot-item';
                item.innerText = name;
                strip.appendChild(item);
            });
            strip.style.transform = `translateY(${getCentralOffset()}px)`;
        }

        function startSlotMachine() {
            if (isSpinning || participants.length <= 1) return;
            
            isSpinning = true;
            document.getElementById('btn-spin').disabled = true;
            document.getElementById('btn-sync').disabled = true;
            document.getElementById('winner-display').innerText = "¡Eligiendo ganador aleatorio...!";

            const strip = document.getElementById('slot-strip');
            const currentOffset = getCentralOffset();
            
            const randomizedList = [...participants].sort(() => Math.random() - 0.5);
            const winnerIndex = Math.floor(Math.random() * participants.length);
            const winnerName = participants[winnerIndex];
            
            const totalRepetitions = 6; 
            let extendedList = [];
            for (let i = 0; i < totalRepetitions; i++) {
                extendedList = extendedList.concat(randomizedList);
            }
            
            const targetGlobalIndex = extendedList.length - randomizedList.length + randomizedList.indexOf(winnerName);
            
            buildSlotStrip(extendedList);

            let currentY = currentOffset;
            const targetY = -(targetGlobalIndex * itemHeight) + currentOffset;
            let startTime = null;
            const duration = 5000; 

            function easeOutQuad(t, b, c, d) {
                return -c *(t/=d)*(t-2) + b;
            }

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;

                if (elapsed < duration) {
                    currentY = easeOutQuad(elapsed, currentOffset, targetY - currentOffset, duration);
                    strip.style.transform = `translateY(${currentY}px)`;
                    requestAnimationFrame(animate);
                } else {
                    strip.style.transform = `translateY(${targetY}px)`;
                    document.getElementById('winner-display').innerText = `🎉 ¡Ganador: ${winnerName}! 🎉`;
                    isSpinning = false;
                    document.getElementById('btn-spin').disabled = false;
                    document.getElementById('btn-sync').disabled = false;
                }
            }
            
            requestAnimationFrame(animate);
        }

        async function fetchParticipants() {
            document.getElementById('winner-display').innerText = "Sincronizando datos de ArcGIS...";
            const queryUrl = `${ARCGIS_LAYER_URL}/query?where=1%3D1&outFields=${CAMPO_NOMBRE}&f=pjson&t=${new Date().getTime()}`;
            
            try {
                const response = await fetch(queryUrl);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const nuevosParticipantes = [];
                
                if (data.features && data.features.length > 0) {
                    data.features.forEach(feature => {
                        const name = feature.attributes[CAMPO_NOMBRE]; 
                        if (name && name.trim() !== '') {
                            nuevosParticipantes.push(name.trim());
                        }
                    });
                }

                if (nuevosParticipantes.length > 0) {
                    participants = nuevosParticipantes;
                    document.getElementById('winner-display').innerText = `Participantes registrados: ${participants.length}`;
                    buildSlotStrip(participants);
                } else {
                    participants = ["Sin registros"];
                    document.getElementById('winner-display').innerText = "La encuesta aún no tiene respuestas.";
                    buildSlotStrip(participants);
                }

            } catch (error) {
                console.error(error);
                document.getElementById('winner-display').innerText = "Error de conexión. Revisa la URL o permisos de ArcGIS.";
                participants = ["Error de red"];
                buildSlotStrip(participants);
            }
        }

        window.addEventListener('load', fetchParticipants);
        window.addEventListener('resize', () => { if(participants.length > 0) buildSlotStrip(participants); });
    </script>
</body>
</html>
