<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Deportiva</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <p><strong>Registro Deportivo</strong></p>
    <h2>2do Primaria</h2>
    <p>Nombres y apellidos</p>
    <input type="text" id="nombre" placeholder="Nombres y apellidos">
    <p>Seccion</p>
    <select id="seccion">
        <option value="a">A</option>
        <option value="b">B</option>
        <option value="c">C</option>
    </select>
    <p>Disciplina</p>
    <select id="disciplina">
        <option value="futbol">Fútbol</option>
        <option value="basket">Básquet</option>
        <option value="voley">Voley</option>
        <option value="balonmano">Balon Mano</option>
    </select>
    <button id="btnEnviar">Enviar Inscripción</button>
    <p id="mensaje"></p>
</div>

<script>
    // Configuración
    const SUPABASE_URL = 'https://pcfajfdswgibzzmbjanp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjZmFqZmRzd2dpYnp6bWJqYW5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzgyMTYsImV4cCI6MjA5Njg1NDIxNn0.X3crcTOH9kPprVJKszu8E9hd68fcXxyXt3nvzm3MbjE';
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('btnEnviar').addEventListener('click', async () => {
        const nombre = document.getElementById('nombre').value;
        const sec = document.getElementById('seccion').value;
        const disc = document.getElementById('disciplina').value;
        const msg = document.getElementById('mensaje');

        msg.innerText = "Enviando...";

        const { data, error } = await sb.rpc('registrar_participante', { 
            nombre_in: nombre, 
            seccion_in: sec
            disciplina_in: disc 
        });

        if (error) {
            msg.innerText = "Error: " + error.message;
        } else {
            msg.innerText = (data === 'Lleno') ? "❌ Cupo agotado, intenta con otra disciplina." : "✅ ¡Inscripción exitosa!";
        }
    });
</script>
</body>
</html>
