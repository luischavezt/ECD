<script>
    // Asegúrate de que esto solo aparezca UNA VEZ en todo tu archivo
    const supabaseUrl = 'https://pcfajfdswgibzzmbjanp.supabase.co';
    const supabaseKey = 'sb_publishable_gV8sgdLKmD9dWuRRc9PZ7A_h-sZcnLB'; // Pega aquí tu llave de la sección Publishable key
    
    // Inicializamos una sola vez
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('btnEnviar').addEventListener('click', async () => {
        const nombre = document.getElementById('nombre').value;
        const disciplina = document.getElementById('disciplina').value;
        const mensaje = document.getElementById('mensaje');

        mensaje.innerText = "Enviando...";

        try {
            const { data, error } = await supabase.rpc('registrar_participante', { 
                nombre_in: nombre, 
                disciplina_in: disciplina 
            });

            if (error) throw error;

            if (data === 'Lleno') {
                mensaje.innerText = "❌ Cupo agotado.";
            } else {
                mensaje.innerText = "✅ ¡Inscripción exitosa!";
            }
        } catch (err) {
            mensaje.innerText = "Error: " + err.message;
            console.error(err);
        }
    });
</script>
