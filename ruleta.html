<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo en Vivo - Marquesina Digital</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.2rem;
            text-align: center;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        
        /* CONTENEDOR ESTILO TRAGAMONEDAS */
        .slot-machine-box {
            position: relative;
            width: 100%;
            height: 140px;
            background: #151522;
            border: 4px solid #0066ff;
            border-radius: 15px;
            margin: 25px 0;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.4), inset 0 0 15px rgba(0,0,0,0.8);
        }
        
        /* Líneas indicadoras del centro */
        .slot-machine-box::before, .slot-machine-box::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 0, 127, 0.6);
            z-index: 10;
        }
        .slot-machine-box::before { top: 35px; }
        .slot-machine-box::after { bottom: 35px; }

        /* Flechas indicadoras laterales */
        .indicator-left, .indicator-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            z-index: 11;
            filter: drop-shadow(0 0 5px #ff007f);
        }
        .indicator-left {
            left: 10px;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 18px solid #ff007f;
        }
        .indicator-right {
            right: 10px;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 18px solid #ff007f;
        }

        /* Tira deslizante que contiene los nombres */
        .slot-strip {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        
        /* Estilo de cada celda de nombre */
        .slot-item {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
            padding: 0 40px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Botones y estado */
        button {
            background: linear-gradient(45deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 16px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.4);
            transition: transform 0.1s, filter 0.2s;
            width: 80%;
            max-width: 350px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #444; box-shadow: none; cursor: not-allowed; }
        
        #winner-display {
            margin-top: 25px;
            font-size: 1.6rem;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sorteo en Vivo</h1>
        <button id="btn-sync" onclick="fetchParticipants()" style="background: #3a3a55; font-size: 0.85rem; padding: 8px 20px; margin-bottom: 10px; width: auto; box-shadow: none;">🔄 Actualizar Lista</button>
         
        <div class="slot-machine-box">
            <div class="indicator-left"></div>
            <div class="indicator-right"></div>
            <div class="slot-strip" id="slot-strip">
                <div class="slot-item" style="color: #aaa;">Cargando...</div>
            </div>
        </div>

        <button id="btn-spin" onclick="startSlotMachine()">¡Iniciar Sorteo!</button>
        <div id="winner-display">Iniciando conexión con ArcGIS...</div>
    </div>

    <script>
        // ========================================================
        // 🚨 CONFIGURACIÓN DE TU CAPA DE ARCGIS ONLINE
        // ========================================================
        // Coloca la URL de tu servicio REST de ArcGIS (debe terminar en /0)
        const ARCGIS_LAYER_URL = 'https://services8.arcgis.com/2qDHoDLqu6VOlf1y/arcgis/rest/services/survey123_33efe2aaf89243e6bf952c3dc96cce92/FeatureServer/0';
        
        // Nombre de la columna de nombres en tu Survey123
        const CAMPO_NOMBRE = 'nombres_y_apellidos'; 
        // ========================================================

        let participants = [];
        let isSpinning = false;
        const itemHeight = 70; // Altura en píxeles de cada bloque de nombre

        // Generar tira visual de nombres en el DOM
        function buildSlotStrip(list) {
            const strip = document.getElementById('slot-strip');
            strip.innerHTML = '';
            
            list.forEach(name => {
                const item = document.createElement('div');
                item.className = 'slot-item';
                item.innerText = name;
                strip.appendChild(item);
            });
            // Posicionar al centro del primer elemento
            strip.style.transform = `translateY(${itemHeight / 2}px)`;
        }

        // LÓGICA DE GIRO (Efecto Tragamonedas con Desaceleración)
        function startSlotMachine() {
            if (isSpinning || participants.length <= 1) return;
            
            isSpinning = true;
            document.getElementById('btn-spin').disabled = true;
            document.getElementById('btn-sync').disabled = true;
            document.getElementById('winner-display').innerText = "¡Eligiendo ganador aleatorio...!";

            const strip = document.getElementById('slot-strip');
            
            // 1. Mezclar de forma aleatoria transparente el arreglo completo para la animación masiva
            const randomizedList = [...participants].sort(() => Math.random() - 0.5);
            
            // 2. Elegimos al ganador real de forma matemática y transparente
            const winnerIndex = Math.floor(Math.random() * participants.length);
            const winnerName = participants[winnerIndex];
            
            // 3. Multiplicamos la lista para crear un efecto de bucle infinito largo y espectacular
            const totalRepetitions = 8; 
            let extendedList = [];
            for (let i = 0; i < totalRepetitions; i++) {
                extendedList = extendedList.concat(randomizedList);
            }
            
            // Forzamos que el elemento final de la animación donde se detenga sea el ganador real
            const targetGlobalIndex = extendedList.length - randomizedList.length + randomizedList.indexOf(winnerName);
            
            // Reconstruimos la tira ampliada en el DOM
            buildSlotStrip(extendedList);

            // 4. Parámetros de animación física
            let currentY = itemHeight / 2;
            const targetY = -(targetGlobalIndex * itemHeight) + (itemHeight / 2);
            let startTime = null;
            const duration = 5000; // Duración de la animación (5 segundos)

            // Función de desaceleración suave (Ease Out)
            function easeOutQuad(t, b, c, d) {
                return -c *(t/=d)*(t-2) + b;
            }

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;

                if (elapsed < duration) {
                    currentY = easeOutQuad(elapsed, itemHeight / 2, targetY - (itemHeight / 2), duration);
                    strip.style.transform = `translateY(${currentY}px)`;
                    requestAnimationFrame(animate);
                } else {
                    // Fin de la animación
                    strip.style.transform = `translateY(${targetY}px)`;
                    document.getElementById('winner-display').innerText = `🎉 ¡Ganador: ${winnerName}! 🎉`;
                    isSpinning = false;
                    document.getElementById('btn-spin').disabled = false;
                    document.getElementById('btn-sync').disabled = false;
                }
            }
            
            requestAnimationFrame(animate);
        }

        // SINCRONIZACIÓN EN TIEMPO REAL DESDE ARCGIS ONLINE
        async function fetchParticipants() {
            document.getElementById('winner-display').innerText = "Sincronizando datos de ArcGIS...";
            const queryUrl = `${ARCGIS_LAYER_URL}/query?where=1%3D1&outFields=${CAMPO_NOMBRE}&f=pjson&t=${new Date().getTime()}`;
            
            try {
                const response = await fetch(queryUrl);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const nuevosParticipantes = [];
                
                if (data.features && data.features.length > 0) {
                    data.features.forEach(feature => {
                        const name = feature.attributes[CAMPO_NOMBRE]; 
                        if (name && name.trim() !== '') {
                            nuevosParticipantes.push(name.trim());
                        }
                    });
                }

                if (nuevosParticipantes.length > 0) {
                    participants = nuevosParticipantes;
                    document.getElementById('winner-display').innerText = `Participantes registrados: ${participants.length}`;
                    buildSlotStrip(participants);
                } else {
                    participants = ["Sin registros"];
                    document.getElementById('winner-display').innerText = "La encuesta aún no tiene respuestas.";
                    buildSlotStrip(participants);
                }

            } catch (error) {
                console.error(error);
                document.getElementById('winner-display').innerText = "Error de conexión. Revisa la URL o permisos de ArcGIS.";
                participants = ["Error de red"];
                buildSlotStrip(participants);
            }
        }

        // Carga inicial automatizada
        fetchParticipants();
    </script>
</body>
</html>
