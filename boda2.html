<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Totem Vertical 55" - Nuestra Boda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background-color: #111; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; }
        #totem-app { width: 1080px; height: 1920px; background-color: #fffaf5; position: absolute; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transform-origin: center center; flex-shrink: 0; }
        .border-frame { position: absolute; top: 30px; left: 30px; right: 30px; bottom: 300px; border: 1px solid rgba(212, 175, 55, 0.3); pointer-events: none; z-index: 10; }
        .slides-wrapper { display: flex; flex-direction: column; width: 100%; height: auto; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 1080px; height: 1920px; flex-shrink: 0; padding: 80px 80px 320px 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        /* Nuevos estilos para la galería */
        #galeria-arcgis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; height: 100%; overflow-y: auto; }
        .foto-item { width: 100%; height: 350px; border-radius: 10px; overflow: hidden; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; }
        /* ... resto de tus estilos originales ... */
        h1, h2, h3 { color: #2c2c2c; font-family: 'Cormorant Garamond', serif; font-weight: 600; text-align: center; }
        h1 { font-size: 110px; line-height: 1.1; margin-bottom: 30px; }
        .slide-title { font-size: 55px; color: #b08d57; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 60px; border-bottom: 2px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; width: 100%; }
        p { font-size: 28px; color: #4a4a4a; line-height: 1.6; margin-bottom: 25px; text-align: center; }
        .highlight-gold { color: #b08d57; font-style: italic; font-weight: 500; font-size: 30px; }
        .touch-menu-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 280px; background-color: #1e1e1e; border-top: 4px solid #b08d57; display: flex; flex-wrap: wrap; justify-content: center; align-content: space-around; padding: 15px 10px; z-index: 100; gap: 8px; }
        .menu-touch-btn { height: 110px; flex: 1 1 18%; max-width: 190px; background: transparent; border: none; color: #aaa; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; border-radius: 12px; }
        .menu-touch-btn i { font-size: 38px; margin-bottom: 6px; }
        .menu-touch-btn span { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .menu-touch-btn.active, .menu-touch-btn:active { color: #fff; background-color: #b08d57; box-shadow: 0 6px 20px rgba(176,141,87,0.5); }
    </style>
</head>
<body>

<div id="totem-app">
    <div class="border-frame"></div>
    <div class="touch-menu-bottom">
        <button class="menu-touch-btn active" onclick="goToSlide(0)"><i class="fa-solid fa-heart"></i><span>Inicio</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(1)"><i class="fa-solid fa-child"></i><span>Carolina</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(2)"><i class="fa-solid fa-child-dress"></i><span>Luis</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(3)"><i class="fa-solid fa-ring"></i><span>Historia</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(4)"><i class="fa-solid fa-users"></i><span>Amigos</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(5)"><i class="fa-solid fa-chart-bar"></i><span>Datos</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(6)"><i class="fa-solid fa-clock"></i><span>Agenda</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(7)"><i class="fa-solid fa-utensils"></i><span>Menú</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(8)"><i class="fa-solid fa-qrcode"></i><span>QR Fotos</span></button>
        <button class="menu-touch-btn" onclick="goToSlide(9)"><i class="fa-solid fa-images"></i><span>Galería</span></button>
    </div>

    <div class="slides-wrapper" id="slidesWrapper">
        <div class="slide">
            <h2 class="slide-title">Galería en Vivo</h2>
            <div id="galeria-arcgis">
                <p style="grid-column: span 2;">Cargando recuerdos...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // URL corregida apuntando a la capa 0
    const FEATURE_LAYER_URL = "https://services8.arcgis.com/2qDHoDLqu6VOlf1y/arcgis/rest/services/survey123_945a32a467d4463f89a94fc94a2eb6e0/FeatureServer/0";

    async function cargarFotosArcGIS() {
        const contenedor = document.getElementById('galeria-arcgis');
        contenedor.innerHTML = "Cargando fotos..."; 

        try {
            // 1. Obtener IDs de los registros
            const queryUrl = `${FEATURE_LAYER_URL}/query?where=1=1&returnIdsOnly=true&f=json`;
            const res = await fetch(queryUrl);
            const data = await res.json();
            
            if (!data.objectIds || data.objectIds.length === 0) {
                contenedor.innerHTML = "Aún no hay fotos. ¡Sé el primero en subir una!";
                return;
            }

            // Tomamos los últimos 20 registros
            const ids = data.objectIds.slice(-20).join(',');
            
            // 2. Obtener los adjuntos de esos registros
            const attRes = await fetch(`${FEATURE_LAYER_URL}/queryAttachments?objectIds=${ids}&f=json`);
            const attData = await attRes.json();
            
            contenedor.innerHTML = ""; 
            
            if (attData.attachmentGroups) {
                attData.attachmentGroups.forEach(group => {
                    group.attachmentInfos.forEach(info => {
                        if (info.contentType.startsWith('image/')) {
                            const imgUrl = `${FEATURE_LAYER_URL}/${group.parentObjectId}/attachments/${info.id}`;
                            contenedor.innerHTML += `
                                <div class="foto-item" style="width: 100%; height: 350px; border-radius: 10px; overflow: hidden; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                                    <img src="${imgUrl}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.parentElement.style.display='none'">
                                </div>`;
                        }
                    });
                });
            }
        } catch (e) {
            contenedor.innerHTML = "Error al conectar con ArcGIS. Verifica tu conexión.";
            console.error(e);
        }
    }

    // Lógica de navegación
    let currentSlideIndex = 0;
    const wrapper = document.getElementById('slidesWrapper');
    const menuButtons = document.querySelectorAll('.menu-touch-btn');

    function goToSlide(index) {
        currentSlideIndex = index;
        updateSliderPosition();
        // Si el usuario entra a la slide 9 (Galería), cargamos las fotos
        if(index === 9) cargarFotosArcGIS();
    }

    function updateSliderPosition() {
        wrapper.style.transform = `translateY(${-currentSlideIndex * 1920}px)`;
        menuButtons.forEach((btn, i) => btn.classList.toggle('active', i === currentSlideIndex));
    }

    function scaleTotemApp() {
        const totem = document.getElementById('totem-app');
        const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
        totem.style.transform = `scale(${scale})`;
    }

    window.addEventListener('load', scaleTotemApp);
    window.addEventListener('resize', scaleTotemApp);
    setTimeout(scaleTotemApp, 200);
</script>
</body>
</html>
