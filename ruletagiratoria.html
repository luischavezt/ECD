<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Interactivo - ArcGIS Online</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* ESTILOS DEL LOGO SUPERIOR */
        .brand-logo {
            max-width: 100%;
            max-height: 80px; /* Evita que sature el espacio en vertical */
            object-fit: contain;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-align: center;
            color: #00d2ff;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }
        .roulette-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            margin: 20px 0;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #2a2a40;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff007f;
            z-index: 10;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }
        button {
            background: linear-gradient(45deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
            transition: transform 0.2s, filter 0.2s;
            width: 80%;
            max-width: 300px;
            display: block;
            margin: 0 auto;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555; box-shadow: none; cursor: not-allowed; }
        
        #winner-display {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 36px;
            text-align: center;
            color: #00ff88;
        }

        /* ========================================================
           📱 RESPONSIVE: ADAPTACIÓN AUTOMÁTICA PARA CELULARES
           ======================================================== */
        @media (max-height: 760px), (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            button { font-size: 1.1rem; padding: 12px 30px; }
            .brand-logo { max-height: 60px; } /* Reducción menor en móviles */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="brand-logo">

        <h1>Sorteo en Vivo</h1>
        <button id="btn-sync" onclick="fetchParticipants()" style="background: #3a3a55; font-size: 0.9rem; padding: 8px 20px; margin-bottom: 10px; width: auto;">🔄 Actualizar Lista</button>
         
        <div class="roulette-box">
            <div class="pointer"></div>
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>

        <button id="btn-spin" onclick="spinWheel()">¡GIRAR RULETA!</button>
        <div id="winner-display">Cargando participantes de ArcGIS...</div>
    </div>

    <script>
        // ==========================================
        // 🚨 CONFIGURACIÓN DE TU CAPA DE ARCGIS ONLINE
        // ==========================================
        const ARCGIS_LAYER_URL = 'https://services8.arcgis.com/2qDHoDLqu6VOlf1y/arcgis/rest/services/survey123_33efe2aaf89243e6bf952c3dc96cce92/FeatureServer/0';
        const CAMPO_NOMBRE = 'nombres_y_apellidos'; 
        // ==========================================

        let participants = ["Esperando datos..."];
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentAngle = 0;
        let isSpinning = false;
        const colors = ['#1abc9c', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#e74c3c', '#2ecc71', '#34495e'];

        function drawWheel() {
            const numSegments = participants.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                const segmentAngle = currentAngle + (i * anglePerSegment);
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, segmentAngle, segmentAngle + anglePerSegment);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = '#1e1e2f';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(segmentAngle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px sans-serif";
                
                let text = participants[i];
                if(text.length > 12) text = text.substring(0, 10) + '...';
                ctx.fillText(text, radius - 20, 5);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (isSpinning || participants.length === 0 || participants.includes("Esperando datos...")) return;
            isSpinning = true;
            document.getElementById('btn-spin').disabled = true;
            document.getElementById('winner-display').innerText = "¡Girando...!";

            const spinAngleStart = Math.random() * 10 + 15;
            let spinTime = 0;
            const spinTimeTotal = Math.random() * 2000 + 14000;

            function easeOut(t, b, c, d) {
                const ts = (t /= d) * t; const tc = ts * t;
                return b + c * (tc + -3 * ts + 3 * t);
            }

            function rotate() {
                spinTime += 30;
                if (spinTime >= spinTimeTotal) { stopRotate(); return; }
                const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
                currentAngle += (spinAngle * Math.PI / 180);
                drawWheel();
                requestAnimationFrame(rotate);
            }
            rotate();
        }

        function stopRotate() {
            isSpinning = false;
            document.getElementById('btn-spin').disabled = false;
            const numSegments = participants.length;
            let degrees = (currentAngle * 180 / Math.PI) % 360;
            let index = Math.floor((360 - degrees + 270) % 360 / (360 / numSegments));
            index = (index + numSegments) % numSegments; 
            document.getElementById('winner-display').innerText = `🎉 ¡Ganador: ${participants[index]}! 🎉`;
        }

        async function fetchParticipants() {
            document.getElementById('winner-display').innerText = "Sincronizando datos de ArcGIS...";
            const queryUrl = `${ARCGIS_LAYER_URL}/query?where=1%3D1&outFields=${CAMPO_NOMBRE}&f=pjson&t=${new Date().getTime()}`;
            
            try {
                const response = await fetch(queryUrl);
                if (!response.ok) throw new Error("Error de conexión");
                
                const data = await response.json();
                const nuevosParticipantes = [];
                
                if (data.features && data.features.length > 0) {
                    data.features.forEach(feature => {
                        const name = feature.attributes[CAMPO_NOMBRE]; 
                        if (name && name.trim() !== '') {
                            nuevosParticipantes.push(name.trim());
                        }
                    });
                }

                if (nuevosParticipantes.length > 0) {
                    participants = nuevosParticipantes;
                    document.getElementById('winner-display').innerText = `Usuarios sincronizados: ${participants.length}`;
                } else {
                    participants = ["Sin registros"];
                    document.getElementById('winner-display').innerText = "La encuesta aún no tiene respuestas.";
                }
                drawWheel();

            } catch (error) {
                console.error("Error en ArcGIS: ", error);
                document.getElementById('winner-display').innerText = "Error. Verifica que la URL y los permisos públicos de la capa de ArcGIS sean correctos.";
            }
        }

        fetchParticipants();
    </script>
</body>
</html>
